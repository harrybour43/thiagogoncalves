<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manutenção</title>
    <style>
        /* Reseta as margens padrão e configura a tela inteira */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #FDFBF7; /* Fundo branco creme */
            color: #2C1E16; /* Fonte marrom bem escuro (quase preto) */
            font-family: system-ui, -apple-system, sans-serif;
            text-align: center;
        }

        /* Container para agrupar e espaçar os elementos */
        .mensagem-container {
            padding: 20px;
            max-width: 90%;
        }

        /* Estilo do texto principal */
        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem); /* O texto cresce ou diminui dependendo da tela */
            margin: 15px 0;
            font-weight: bold;
        }

        /* Estilo para deixar os emojis com bom destaque */
        .emoji {
            font-size: clamp(3rem, 8vw, 5rem);
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <div class="mensagem-container">
        <div class="emoji">⚠️</div>
        <h1>Site em Manutenção!</h1>
        <div class="emoji">🚧</div>
    </div>

</body>
</html>
